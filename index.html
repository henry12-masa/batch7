<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>資格クイズ 第7弾</title>
  <meta name="description" content="第7弾の資格試験対策クイズ。公認内部監査人、CFE、ISO審査員補、HACCP、防災士、衛生管理者などをランダム50問で学習できます。" />
  <link rel="stylesheet" href="style.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802" crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header">
    <button id="homeBtn" class="home-btn">ホームに戻る</button>
    <div>
      <p class="label">資格総合クイズ</p>
      <h1>第7弾 資格試験対策クイズ</h1>
      <p class="lead">15資格から選択。各資格200問からランダム50問を出題します。</p>
    </div>
  </header>

  <main class="layout">
    <aside class="ad-side ad-left" aria-label="広告枠 左">
      <div class="ad-box">
        <span>広告</span>
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-client="ca-pub-8398161859137802"
          data-ad-slot="5599163841"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
      </div>
    </aside>

    <section class="content">
      <section id="homeScreen" class="card">
        <h2>資格を選択してください</h2>
        <p class="note">回答すると自動で次の問題へ移動します。全50問終了後に結果を表示します。</p>
        <div id="examList" class="exam-grid"></div>
      </section>

      <section id="quizScreen" class="card hidden">
        <div class="quiz-top">
          <div>
            <p id="examTitle" class="label"></p>
            <h2 id="questionCount">第1問</h2>
          </div>
          <div class="score-pill">正解 <span id="scoreNow">0</span></div>
        </div>
        <div class="progress"><div id="progressBar"></div></div>
        <p id="questionText" class="question"></p>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback hidden"></div>
      </section>

      <section id="resultScreen" class="card hidden result-card">
        <h2>結果</h2>
        <p id="resultText" class="result-score"></p>
        <p id="resultMessage" class="note"></p>
        <div class="actions">
          <button id="retryBtn" class="primary">もう一度挑戦</button>
          <button id="backHomeBtn" class="secondary">ホームへ戻る</button>
        </div>
      </section>
    </section>

    <aside class="ad-side ad-right" aria-label="広告枠 右">
      <div class="ad-box">
        <span>広告</span>
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-client="ca-pub-8398161859137802"
          data-ad-slot="5599163841"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
      </div>
    </aside>
  </main>

  <footer class="footer">© 資格クイズ 第7弾</footer>

  <script src="data/cia.js"></script>
  <script src="data/cfe.js"></script>
  <script src="data/iso9001-auditor.js"></script>
  <script src="data/iso14001-auditor.js"></script>
  <script src="data/iso27001-auditor.js"></script>
  <script src="data/haccp-manager.js"></script>
  <script src="data/food-label.js"></script>
  <script src="data/fire-manager.js"></script>
  <script src="data/bosaisi.js"></script>
  <script src="data/eisei-manager1.js"></script>
  <script src="data/eisei-manager2.js"></script>
  <script src="data/safety-consultant.js"></script>
  <script src="data/health-consultant.js"></script>
  <script src="data/environment-meter.js"></script>
  <script src="data/work-environment.js"></script>
  <script src="script.js"></script>
  <script>
    window.addEventListener('load', function(){
      try {
        document.querySelectorAll('.adsbygoogle').forEach(function(){
          (adsbygoogle = window.adsbygoogle || []).push({});
        });
      } catch(e) {}
    });
  </script>
</body>
</html>
